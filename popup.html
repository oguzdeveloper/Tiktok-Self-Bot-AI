<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok AI Auto Reply</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo">
        <span class="logo-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="14" rx="3" stroke="url(#bgr)" stroke-width="2"/><circle cx="9" cy="11" r="1.5" fill="url(#bgr)"/><circle cx="15" cy="11" r="1.5" fill="url(#bgr)"/><path d="M9 21h6" stroke="url(#bgr)" stroke-width="2" stroke-linecap="round"/><path d="M12 18v3" stroke="url(#bgr)" stroke-width="2" stroke-linecap="round"/><path d="M12 4V2" stroke="url(#bgr)" stroke-width="2" stroke-linecap="round"/><defs><linearGradient id="bgr" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#ff6b6b"/><stop offset=".5" stop-color="#feca57"/><stop offset="1" stop-color="#48dbfb"/></linearGradient></defs></svg></span>
        <h1>TikTok AI Auto Reply</h1>
      </div>
      <p class="subtitle">AI-powered DM auto-responder</p>
    </header>

    <main class="popup-main">
      <!-- Status -->
      <div class="status-card">
        <div class="status-indicator" id="statusIndicator">
          <span class="status-dot"></span>
          <span class="status-text" id="statusText">Connecting...</span>
        </div>
      </div>

      <!-- Settings -->
      <div class="settings-section">
        <h2><svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="vertical-align:-2px;margin-right:4px;"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/></svg>Settings</h2>

        <!-- API Key -->
        <div class="input-group">
          <label for="apiKeyInput">Fireworks AI API Key</label>
          <div class="input-wrapper">
            <input type="password" id="apiKeyInput" placeholder="fw_..." autocomplete="off">
            <button class="toggle-visibility" id="toggleApiKeyVisibility" type="button" title="Show / Hide">
              <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
          <span class="hint"><a href="https://fireworks.ai/api-keys" target="_blank">Get your API key</a></span>
        </div>

        <!-- Language -->
        <div class="input-group">
          <label for="languageSelect">Language</label>
          <select id="languageSelect" class="styled-select">
            <option value="en">English (EN)</option>
            <option value="tr">Türkçe (TR)</option>
            <option value="custom">Custom Prompt</option>
          </select>
        </div>

        <!-- Custom Prompt -->
        <div class="input-group" id="customPromptGroup" style="display:none;">
          <label for="customPromptInput">Custom System Prompt</label>
          <textarea id="customPromptInput" rows="6" placeholder="Enter your custom system prompt here..."></textarea>
        </div>

        <!-- Reply Delay -->
        <div class="input-group">
          <label for="replyDelayInput">Reply Delay (ms)</label>
          <input type="number" id="replyDelayInput" value="1200" min="0" max="30000" step="100">
        </div>

        <!-- Save -->
        <button class="btn btn-secondary" id="saveSettingsBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="margin-right:4px;"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M17 21v-8H7v8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M7 3v5h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span id="saveBtnText">Save</span>
        </button>
      </div>

      <!-- Toggle Bot -->
      <div class="action-buttons">
        <button class="btn btn-primary" id="toggleBotBtn">
          <svg class="btn-icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span id="btnText">Stop Bot</span>
        </button>
      </div>

      <!-- Message -->
      <div class="message" id="message"></div>
    </main>

    <footer class="popup-footer">
      <p>AI-powered TikTok DM auto-replies</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
